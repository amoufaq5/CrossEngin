name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: build · typecheck · offline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test

  integration:
    name: real-Postgres integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: crossengin_test
      PGSSLMODE: disable
      CROSSENGIN_PG_TEST: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Ensure psql client
        run: psql --version || sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Provision the integration database
        run: bash scripts/setup-integration-db.sh
      - name: Schema drift gate
        # `crossengin-pg drift` introspects the live `meta` schema and diffs it
        # against META_TABLES (the source-of-truth the bootstrap DDL was emitted
        # from). It EXITS 1 on any drift (added/removed/modified table, column,
        # index, policy, or RLS toggle). Run *before* the gated suites so it
        # gates the freshly-provisioned baseline — those suites write rows but
        # don't migrate the meta schema, so any drift here is a real
        # meta-schema-vs-applier divergence, not test pollution.
        run: node packages/kernel-pg/dist/bin/crossengin-pg.js drift
      - name: Gated integration tests (workflow-worker + operate-server + operate-web)
        # CROSSENGIN_PG_TEST=1 (env above) un-skips the gated suites; the offline
        # tests in these apps run too and stay green. operate-web's gated suite
        # (P3.7) drives the /ui/... view-model routes over a PostgresEntityStore.
        run: |
          pnpm --filter @crossengin/workflow-worker-app test
          pnpm --filter @crossengin/operate-server test
          pnpm --filter @crossengin/operate-web-app test
          pnpm --filter @crossengin/active-active-runtime-pg test
      - name: Incident timeline drift gate
        # The gated suites above declare/escalate/resolve/ack/mitigate real
        # incidents in meta.incidents. `incidents verify` runs the timeline drift
        # sweep over a wide window and EXITS 1 if any incident's timeline drifted
        # from declared -> (severity_changed|status_changed)* -> resolved, failing
        # the job. An empty table verifies clean (exit 0).
        run: node apps/workflow-worker/dist/bin/workflow-worker.js incidents verify --from 2000-01-01 --to 2100-01-01
      - name: PHI at-rest encryption gate
        # The operate-server column-store suite provisions encrypted PHI tables
        # (e.g. Patient.mrn -> BYTEA) in the `public` schema. `encrypt --verify`
        # reports at-rest coverage for every column hinted
        # crossengin.encrypt=at_rest and EXITS 1 on any plaintext PHI column (or
        # missing pgcrypto), failing the job. `meta` asserts the platform catalog
        # carries zero plaintext PHI (an HIPAA control); `public` verifies the
        # column store actually encrypted the PHI it provisioned. An un-hinted
        # schema verifies clean (exit 0).
        run: |
          node packages/kernel-pg/dist/bin/crossengin-pg.js encrypt --verify --schema=meta
          node packages/kernel-pg/dist/bin/crossengin-pg.js encrypt --verify --schema=public
      - name: Gateway execution drift gate
        # `GatewayReplayer.bulkVerify` reads every persisted PipelineExecution in
        # meta.gateway_pipeline_executions and runs the pure shape checks (stages
        # out of order, stage repeated, final stage/outcome mismatch, pass with
        # 4xx/5xx, deny without 4xx/5xx, terminating outcome not last, duration
        # inconsistent, rate-limit-decision orphaned). `executions verify` EXITS 1
        # if ANY execution drifted, failing the job. Non-vacuous since P2.45
        # (ADR-0153): the operate-server gated suite runs with --persist-executions,
        # so this audits REAL persisted executions (+ their rate-limit decisions).
        # Run after the gated suites so it sees what they populated.
        run: node packages/api-gateway-pg/dist/bin/crossengin-gateway-pg.js executions verify --since 2000-01-01
      - name: SLO enforcement drift gate
        # The operate-server gated SLO suite (--slo-persist, P2.33) writes
        # enforcement actions + evaluation snapshots to meta.slo_enforcement_actions
        # / meta.slo_evaluations via the persistent SLO engine. `slo verify` runs
        # verifyEnforcementHistory over a wide window and EXITS 1 on any drift
        # (ongoing/recovered-without-open, duplicate-open, paged-without-channels,
        # kill-switch-without-flag). An empty table verifies clean (exit 0).
        run: node packages/observability-runtime-pg/dist/bin/crossengin-slo.js slo verify --since 2000-01-01
      - name: SDK ledger drift gate
        # The operate-server gated SDK-ledger suite (openapi-client --persist, P3.46)
        # writes ClientRelease + CompatibilityEntry rows to meta.sdk_client_releases /
        # meta.sdk_compatibility_entries. `sdk-releases verify` runs the pure
        # verifySdkLedger cross-table sweep (P3.48) and EXITS 1 on any drift: a
        # published release without a matching compatibility entry, a compatibility
        # entry with no matching release, or a published release marked
        # unsupported/blocked. An empty ledger verifies clean (exit 0); the gated
        # suite's draft release + fully_compatible entry are consistent, so this is
        # non-vacuous yet green. Run after the gated suites so it sees what they wrote.
        run: node apps/operate-server/dist/bin/operate-server.js sdk-releases verify --limit 1000
      - name: Replication ledger drift gate
        # The active-active-runtime-pg gated suite (integration.test.ts, P6.4) drives a
        # concurrent two-region write through real ReplicationEngines and persists the
        # events + concurrent-resolution to meta.replication_events /
        # meta.replication_conflicts. `replication verify` runs the pure
        # verifyReplicationLedger cross-table sweep (P6.5) and EXITS 1 on any drift: a
        # concurrent_merged event without a matching conflict (or vice versa), a
        # non-auto-resolved or same-region conflict, or a concurrent event with the wrong
        # causal relation. An empty ledger verifies clean (exit 0); the gated suite's
        # concurrent write + its auto-resolved conflict are consistent, so this is
        # non-vacuous yet green. Run after the gated suites so it sees what they wrote.
        run: node packages/active-active-runtime-pg/dist/bin/crossengin-replication.js verify --since 2000-01-01
