name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: build · lint · format · typecheck · typecheck:tests · test · coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # version is read from the "packageManager" field in package.json
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Lint (ESLint flat config, whole workspace)
        run: pnpm lint

      # Prettier --check over TS/JS source (ADR-0250). Scoped via .prettierignore
      # to source only; markdown/JSON/YAML are hand-maintained. Fails the job if
      # any file would be reformatted — keeps `pnpm format` idempotent on main.
      - name: Format check (Prettier --check)
        run: pnpm format:check

      - name: Type-check src (per package)
        run: pnpm -r typecheck

      # Closes the systemic src/test drift gap (ADR-0244): every *.test.ts is
      # type-checked here. The script builds first (turbo cache hits the step
      # above) then runs the single-root-pass tsc.
      - name: Type-check test files (workspace-wide)
        run: pnpm typecheck:tests

      - name: Test all packages
        run: pnpm -r test

      # Workspace-wide coverage gate (ADR-0261). Vitest V8 with thresholds
      # configured in `@crossengin/testing`'s vitestPreset: statements 80%,
      # branches 70%, functions 80%, lines 80%. Per-package Vitest exits
      # non-zero when any threshold fails; `pnpm -r` propagates that. Re-runs
      # the full suite under V8 instrumentation — the coverage flag is the
      # gate, the test step above is the smoke. Filter excludes
      # @crossengin/config (no vitest dep — typescript/eslint/prettier configs
      # only); every other workspace package has a vitest.config.ts.
      - name: Coverage gate (V8, workspace-wide)
        run: pnpm coverage
